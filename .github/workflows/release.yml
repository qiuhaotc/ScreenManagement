name: Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ScreenManagement.slnx

      - name: Test
        run: dotnet test src/ScreenManagement.Test/ScreenManagement.Test.csproj --configuration Release --verbosity normal

      - name: Publish (self-contained)
        run: |
          dotnet publish src/ScreenManagement.UI/ScreenManagement.UI.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output ./publish/win-x64-full `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=none

      - name: Publish (framework-dependent)
        run: |
          dotnet publish src/ScreenManagement.UI/ScreenManagement.UI.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained false `
            --output ./publish/win-x64 `
            -p:PublishSingleFile=true `
            -p:DebugType=none

      - name: Create archives
        run: |
          Compress-Archive -Path ./publish/win-x64-full/ScreenManagement.exe -DestinationPath ./publish/ScreenManagement-${{ github.ref_name }}-win-x64-full.zip
          Compress-Archive -Path ./publish/win-x64/ScreenManagement.exe -DestinationPath ./publish/ScreenManagement-${{ github.ref_name }}-win-x64.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./publish/ScreenManagement-${{ github.ref_name }}-win-x64-full.zip
            ./publish/ScreenManagement-${{ github.ref_name }}-win-x64.zip
          generate_release_notes: true
